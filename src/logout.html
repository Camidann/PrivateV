<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión cerrada - PrivateV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .logout-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .logout-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 48px 32px;
            text-align: center;
        }

        .logout-icon {
            width: 64px;
            height: 64px;
            background: #065fd4;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 2rem;
            margin: 0 auto 24px;
        }

        .logout-card h2 {
            margin: 0 0 12px 0;
            font-size: 1.6rem;
            font-weight: 500;
        }

        .logout-card p {
            margin: 0 0 32px 0;
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 28px;
            background: #065fd4;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: all 200ms ease;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            background: #0d47a1;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .logout-container {
                padding: 16px;
            }

            .logout-card {
                padding: 32px 24px;
            }

            .logout-card h2 {
                font-size: 1.4rem;
            }

            .logout-icon {
                width: 56px;
                height: 56px;
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="logout-card">
            <div class="logout-icon">✓</div>
            <h2>Sesión cerrada</h2>
            <p>Has cerrado sesión correctamente. Puedes acceder nuevamente cuando lo necesites.</p>
            <button class="back-btn" onclick="window.location.href='/galeriaVideos'">Volver a PrivateV</button>
        </div>
    </div>
</body>
</html>
