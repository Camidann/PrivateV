<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión cerrada</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #eef4ff;
            --surface: #ffffff;
            --accent: #4f46e5;
            --text: #111827;
            --muted: #6b7280;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
        }

        .logout-card {
            width: min(440px, 100%);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(226, 232, 240, 0.95);
        }

        .logout-title {
            margin: 0 0 18px;
            font-size: 1.8rem;
            letter-spacing: -0.03em;
        }

        .logout-msg {
            margin: 0 0 30px;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.75;
        }

        .back-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 16px 30px rgba(79, 70, 229, 0.18);
            transition: transform 150ms ease, box-shadow 150ms ease;
        }

        .back-btn:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="logout-card">
        <div class="logout-title">Sesión cerrada</div>
        <div class="logout-msg">Has cerrado sesión correctamente. Puedes volver a la galería cuando quieras.</div>
        <button class="back-btn" onclick="window.location.href='/galeriaVideos'">Volver a la galería</button>
    </div>
</body>
</html>
