<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión cerrada - PrivateV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/logout.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema" style="position:fixed;top:20px;right:20px;z-index:999;width:40px;height:40px;font-size:1.3rem;">🌙</button>
    <div class="card">
        <div class="icon">✓</div>
        <h2>Sesión cerrada</h2>
        <p>Cerraste sesión correctamente. Nos vemos pronto.</p>
        <button class="btn" onclick="window.location.href='/galeriaVideos'">Volver a PrivateV</button>
    </div>
    <script>
        (function() {
            const key = 'pv-theme';
            const btn = document.getElementById('themeToggle');
            function setTheme(t) {
                document.documentElement.setAttribute('data-theme', t);
                localStorage.setItem(key, t);
                if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
            }
            const saved = localStorage.getItem(key) || 'light';
            setTheme(saved);
            if (btn) btn.addEventListener('click', () => {
                const cur = document.documentElement.getAttribute('data-theme');
                setTheme(cur === 'dark' ? 'light' : 'dark');
            });
        })();
    </script>
</body>
</html>
