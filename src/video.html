<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{.titulo}} - PrivateV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/video.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand-logo">
            <div class="logo-icon">P</div>
            <span>PrivateV</span>
        </a>
        <div class="nav-right">
            <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌙</button>
            <a href="/galeriaVideos" class="back-btn">Volver</a>
        </div>
    </nav>
    <div class="player-container">
        <div class="player-wrapper">
            {{ if .esVideo }}
            <video controls>
                <source src="{{.video}}" type="video/mp4">
                Tu navegador no soporta video.
            </video>
            {{ else }}
            <img src="{{.video}}" alt="{{.titulo}}">
            {{ end }}
        </div>
        <div class="video-info-section">
            <div class="video-header">
                <h1 class="video-title">{{.titulo}}</h1>
            </div>
            <div class="actions">
                <a href="/galeriaVideos" class="back-link">← Biblioteca</a>
                <form method="POST" action="/video/{{.filename}}/delete" onsubmit="return confirm('¿Eliminar este video permanentemente?')" style="display:inline">
                    <button type="submit" class="delete-btn">Eliminar</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        (function() {
            const key = 'pv-theme';
            const btn = document.getElementById('themeToggle');
            function setTheme(t) {
                document.documentElement.setAttribute('data-theme', t);
                localStorage.setItem(key, t);
                if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
            }
            const saved = localStorage.getItem(key) || 'light';
            setTheme(saved);
            if (btn) btn.addEventListener('click', () => {
                const cur = document.documentElement.getAttribute('data-theme');
                setTheme(cur === 'dark' ? 'light' : 'dark');
            });
        })();
    </script>
</body>
</html>
