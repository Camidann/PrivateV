<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{.titulo}} - PrivateV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
        }

        .navbar {
            background: #111;
            border-bottom: 1px solid #222;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 4px;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 1rem;
        }

        .back-btn {
            padding: 8px 14px;
            background: transparent;
            color: #aaa;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: all 200ms ease;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: #222;
            color: #fff;
            border-color: #444;
        }

        .player-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .player-wrapper {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        .player-wrapper video {
            width: 100%;
            height: auto;
            display: block;
            min-height: 500px;
        }

        .video-info-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
        }

        .video-title-group {
            flex: 1;
        }

        .video-title {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 500;
            line-height: 1.2;
            word-break: break-word;
            letter-spacing: -0.5px;
        }

        .video-meta {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            color: #888;
            font-size: 0.9rem;
        }

        .video-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-dot {
            width: 4px;
            height: 4px;
            background: #888;
            border-radius: 50%;
        }

        .video-actions {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            background: #065fd4;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 200ms ease;
            border: none;
            cursor: pointer;
            max-width: fit-content;
        }

        .back-link:hover {
            background: #0d47a1;
            transform: translateY(-2px);
        }

        .description-section {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 20px;
            margin-top: 24px;
        }

        .description-section h3 {
            margin: 0 0 12px 0;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }

        .description-text {
            margin: 0;
            color: #aaa;
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty-description {
            color: #666;
            font-style: italic;
        }

        @media (max-width: 1024px) {
            .player-container {
                padding: 24px 16px;
            }

            .player-wrapper video {
                min-height: 400px;
            }

            .video-title {
                font-size: 1.8rem;
            }

            .video-header {
                flex-direction: column;
            }
        }

        @media (max-width: 768px) {
            .player-wrapper video {
                min-height: 300px;
            }

            .player-container {
                padding: 16px 12px;
            }

            .video-title {
                font-size: 1.5rem;
            }

            .video-meta {
                gap: 12px;
                flex-wrap: wrap;
            }

            .description-section {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 10px 12px;
            }

            .player-wrapper video {
                min-height: 220px;
            }

            .video-title {
                font-size: 1.2rem;
            }

            .player-container {
                padding: 12px 8px;
            }

            .back-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand-logo">
            <div class="logo-icon">P</div>
            <span>PrivateV</span>
        </a>
        <a href="/galeriaVideos" class="back-btn">Volver</a>
    </nav>

    <div class="player-container">
        <div class="player-wrapper">
            <video controls>
                <source src="{{.video}}" type="video/mp4">
                Tu navegador no soporta la reproducción de video.
            </video>
        </div>

        <div class="video-info-section">
            <div class="video-header">
                <div class="video-title-group">
                    <h1 class="video-title">{{.titulo}}</h1>
                    <div class="video-meta">
                        <div class="video-meta-item">
                            <span>Privado</span>
                        </div>
                        <div class="video-meta-item">
                            <span class="meta-dot"></span>
                            <span>Video</span>
                        </div>
                    </div>
                </div>
                <div class="video-actions">
                    <a href="/galeriaVideos" class="back-link">← Biblioteca</a>
                </div>
            </div>

            {{if .descripcion}}
            <div class="description-section">
                <h3>Descripción</h3>
                <p class="description-text">{{.descripcion}}</p>
            </div>
            {{end}}
        </div>
    </div>
</body>
</html>
