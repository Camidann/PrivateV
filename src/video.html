<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{.titulo}} - PrivateV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/video.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand-logo">
            <div class="logo-icon">P</div>
            <span>PrivateV</span>
        </a>
        <a href="/galeriaVideos" class="back-btn">Volver</a>
    </nav>
    <div class="player-container">
        <div class="player-wrapper">
            {{ if .esVideo }}
            <video controls>
                <source src="{{.video}}" type="video/mp4">
                Tu navegador no soporta video.
            </video>
            {{ else }}
            <img src="{{.video}}" alt="{{.titulo}}">
            {{ end }}
        </div>
        <div class="video-info-section">
            <div class="video-header">
                <h1 class="video-title">{{.titulo}}</h1>
            </div>
            <div class="actions">
                <a href="/galeriaVideos" class="back-link">← Biblioteca</a>
                <form method="POST" action="/video/{{.filename}}/delete" onsubmit="return confirm('¿Eliminar este video permanentemente?')" style="display:inline">
                    <button type="submit" class="delete-btn">Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
