<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error de inicio de sesión</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(120deg, #e0e7ff 0%, #f4f4f4 100%);
            margin: 0;
            min-height: 100vh;
        }
        .center-box {
            max-width: 400px;
            margin: 90px auto;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 36px 32px 28px 32px;
            text-align: center;
        }
        .error-icon {
            font-size: 3em;
            color: #e53935;
            margin-bottom: 18px;
        }
        h2 {
            color: #e53935;
            margin-bottom: 12px;
        }
        p {
            color: #444;
            margin-bottom: 22px;
        }
        .back-link {
            display: inline-block;
            padding: 10px 22px;
            background: linear-gradient(90deg, #007bff 60%, #0056b3 100%);
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1em;
            transition: background 0.2s;
        }
        .back-link:hover {
            background: linear-gradient(90deg, #0056b3 60%, #007bff 100%);
        }
    </style>
</head>
<body>
    <div class="center-box">
        <div class="error-icon">⚠️</div>
        <h2>Usuario o contraseña incorrectos</h2>
        <p>Verifica tus datos e intenta nuevamente.</p>
        <a class="back-link" href="/sign-in">Volver a iniciar sesión</a>
    </div>
</body>
</html>
