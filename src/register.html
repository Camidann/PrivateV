<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear cuenta - PrivateV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .auth-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 40px 32px;
        }

        .brand-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 6px;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 1.4rem;
            margin: 0 auto 16px;
        }

        .brand-section h1 {
            margin: 0 0 8px 0;
            font-size: 1.6rem;
            font-weight: 500;
        }

        .brand-section p {
            margin: 0;
            color: #aaa;
            font-size: 0.9rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
        }

        .form-group input {
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            transition: all 200ms ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #065fd4;
            background: #1a1a1a;
            box-shadow: 0 0 0 2px rgba(6, 95, 212, 0.1);
        }

        .form-group input::placeholder {
            color: #666;
        }

        .submit-btn {
            padding: 12px;
            background: #065fd4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms ease;
            margin-top: 8px;
        }

        .submit-btn:hover {
            background: #0d47a1;
            transform: translateY(-2px);
        }

        .auth-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
            text-align: center;
        }

        .auth-link {
            color: #065fd4;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 200ms ease;
        }

        .auth-link:hover {
            color: #0d47a1;
        }

        @media (max-width: 600px) {
            .auth-container {
                padding: 16px;
            }

            .auth-card {
                padding: 28px 20px;
            }

            .brand-section h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-section">
                <div class="logo-icon">P</div>
                <h1>PrivateV</h1>
                <p>Crear una nueva cuenta</p>
            </div>

            <form class="auth-form" method="POST" action="/register">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Elige un usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="submit-btn">Crear cuenta</button>
            </form>

            <div class="auth-links">
                <a href="/sign-in" class="auth-link">¿Ya tienes cuenta? Inicia sesión</a>
                <a href="/galeriaVideos" class="auth-link">← Volver</a>
            </div>
        </div>
    </div>
</body>
</html>
