<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear cuenta - PrivateV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema" style="position:fixed;top:20px;right:20px;z-index:999;width:40px;height:40px;font-size:1.3rem;">🌙</button>
    <div class="auth-card">
        <div class="brand-section">
            <div class="logo-icon" style="margin:0 auto 16px;">P</div>
            <h1>PrivateV</h1>
            <p>Creá tu cuenta gratis</p>
        </div>
        <form class="auth-form" method="POST" action="/register">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" placeholder="Elegí un usuario" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
            </div>
            <button type="submit" class="submit-btn">Crear cuenta</button>
        </form>
        <div class="auth-links">
            <a href="/sign-in" class="auth-link">¿Ya tenés cuenta? Iniciá sesión</a>
            <a href="/galeriaVideos" class="auth-link" style="color:var(--text-muted);">← Volver</a>
        </div>
    </div>
    <script>
        (function() {
            const key = 'pv-theme';
            const btn = document.getElementById('themeToggle');
            function setTheme(t) {
                document.documentElement.setAttribute('data-theme', t);
                localStorage.setItem(key, t);
                if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
            }
            const saved = localStorage.getItem(key) || 'light';
            setTheme(saved);
            if (btn) btn.addEventListener('click', () => {
                const cur = document.documentElement.getAttribute('data-theme');
                setTheme(cur === 'dark' ? 'light' : 'dark');
            });
        })();
    </script>
</body>
</html>
