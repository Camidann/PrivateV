<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #eef4ff;
            --surface: #ffffff;
            --accent: #4f46e5;
            --accent-soft: #eef2ff;
            --text: #111827;
            --muted: #6b7280;
            --border: #dbeafe;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth-card {
            width: min(100%, 400px);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(226, 232, 240, 0.95);
            border-radius: 28px;
            padding: 34px 30px 28px;
            box-shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 26px;
        }

        .brand-mark {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .brand-title {
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: -0.03em;
        }

        .brand-subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        h2 {
            margin: 0 0 24px;
            font-size: 1.65rem;
            letter-spacing: -0.02em;
        }

        form {
            display: grid;
            gap: 16px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #f8fbff;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 150ms ease, box-shadow 150ms ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
        }

        button {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 16px 30px rgba(79, 70, 229, 0.18);
            transition: transform 150ms ease, box-shadow 150ms ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .link-group {
            display: grid;
            gap: 10px;
            margin-top: 24px;
        }

        .nav-link {
            color: var(--accent);
            text-decoration: none;
            text-align: center;
            font-weight: 600;
        }

        .nav-link:hover {
            color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <div class="brand-mark">V</div>
            <div>
                <p class="brand-title">Iniciar Sesión</p>
                <span class="brand-subtitle">Accede a tu galería de videos</span>
            </div>
        </div>

        <h2>Bienvenido de nuevo</h2>
        <form method="POST" action="/sign-in">
            <input type="text" name="usuario" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>

        <div class="link-group">
            <a class="nav-link" href="/galeriaVideos">← Volver a la galería</a>
            <a class="nav-link" href="/register">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>
</body>
</html>
