<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Subir Video</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #eef4ff;
            --surface: #ffffff;
            --accent: #4f46e5;
            --text: #111827;
            --muted: #6b7280;
            --border: #dbeafe;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top, rgba(79, 70, 229, 0.16), transparent 24%),
                        linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .page-shell {
            width: min(100%, 520px);
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            width: 48px;
            height: 48px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .brand-title {
            margin: 0;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .header-action {
            padding: 10px 18px;
            border-radius: 999px;
            background: white;
            color: var(--text);
            border: 1px solid #d1d5db;
            text-decoration: none;
            font-weight: 600;
            transition: transform 150ms ease, background 150ms ease;
        }

        .header-action:hover {
            transform: translateY(-1px);
            background: #f8fafc;
        }

        .upload-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            border: 1px solid rgba(226, 232, 240, 0.95);
            padding: 34px 30px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        }

        .upload-card h1 {
            margin: 0 0 16px;
            font-size: 1.9rem;
            line-height: 1.1;
        }

        p.lead {
            margin: 0 0 26px;
            color: var(--muted);
            line-height: 1.75;
        }

        form {
            display: grid;
            gap: 18px;
        }

        label {
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: #f8fbff;
            font-size: 1rem;
            transition: border-color 150ms ease, box-shadow 150ms ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
        }

        button {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 16px 30px rgba(79, 70, 229, 0.18);
            transition: transform 150ms ease, box-shadow 150ms ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .back-link {
            display: inline-flex;
            justify-content: center;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            padding: 12px 0;
        }

        .back-link:hover {
            color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="top-bar">
            <div class="brand">
                <div class="brand-mark">O</div>
                <div class="brand-title">Subir video</div>
            </div>
            <a class="header-action" href="/logout">Cerrar sesión</a>
        </div>

        <section class="upload-card">
            <h1>Sube tu próximo video</h1>
            <p class="lead">Selecciona un archivo MP4/Gif y dale un título claro para que puedas encontrarlo rápido en tu galería.</p>
            <form method="POST" action="/upload/charge" enctype="multipart/form-data">
                <div>
                    <label for="video">Archivo de video (.mp4/.gif)</label>
                    <input id="video" type="file" name="video" accept="video/mp4, video/gif" required>
                </div>
                <div>
                    <label for="nombre">Título del video</label>
                    <input id="nombre" type="text" name="nombre" placeholder="Ej. Paseo en la ciudad" required>
                </div>
                <button type="submit">Cargar video</button>
            </form>
            <a class="back-link" href="/galeriaVideos">← Volver a la galería</a>
        </section>
    </div>
</body>
</html>
