<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Subir Video - PrivateV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            color: #fff;
        }

        .navbar {
            background: #111;
            border-bottom: 1px solid #222;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 4px;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 1rem;
        }

        .back-btn {
            padding: 8px 14px;
            background: transparent;
            color: #aaa;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: all 200ms ease;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: #222;
            color: #fff;
            border-color: #444;
        }

        .upload-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 24px;
        }

        .upload-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 40px 32px;
        }

        .upload-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .upload-header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .upload-header p {
            margin: 0;
            color: #aaa;
            font-size: 0.95rem;
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
        }

        .form-group input[type="text"],
        .form-group textarea {
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            transition: all 200ms ease;
            font-family: inherit;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #065fd4;
            background: #1a1a1a;
            box-shadow: 0 0 0 2px rgba(6, 95, 212, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 32px;
            background: #1a1a1a;
            border: 2px dashed #333;
            border-radius: 4px;
            cursor: pointer;
            transition: all 200ms ease;
        }

        .file-input-label:hover {
            border-color: #065fd4;
            background: #222;
        }

        .file-input-icon {
            font-size: 1.8rem;
        }

        .file-input-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left;
        }

        .file-input-text strong {
            color: #fff;
        }

        .file-input-text span {
            color: #aaa;
            font-size: 0.85rem;
        }

        .form-group input[type="file"] {
            display: none;
        }

        .file-name {
            color: #065fd4;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .submit-btn {
            padding: 14px;
            background: #065fd4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms ease;
        }

        .submit-btn:hover {
            background: #0d47a1;
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }

        .form-links {
            text-align: center;
            margin-top: 24px;
        }

        .form-links a {
            color: #065fd4;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 200ms ease;
        }

        .form-links a:hover {
            color: #0d47a1;
        }

        @media (max-width: 600px) {
            .navbar {
                padding: 10px 12px;
            }

            .upload-container {
                margin: 40px auto;
                padding: 16px;
            }

            .upload-card {
                padding: 28px 20px;
            }

            .upload-header h2 {
                font-size: 1.4rem;
            }

            .file-input-label {
                padding: 24px;
                flex-direction: column;
                text-align: center;
            }

            .file-input-text {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand-logo">
            <div class="logo-icon">P</div>
            <span>PrivateV</span>
        </a>
        <a href="/galeriaVideos" class="back-btn">Volver</a>
    </nav>

    <div class="upload-container">
        <div class="upload-card">
            <div class="upload-header">
                <h2>Subir Video</h2>
                <p>Comparte tus videos de forma privada y segura</p>
            </div>

            <form class="upload-form" method="POST" action="/upload/charge" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Ingresa el título del video" required>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" placeholder="Agregá una descripción (opcional)"></textarea>
                </div>

                <div class="form-group">
                    <label>Seleccionar archivo</label>
                    <div class="file-input-wrapper">
                        <label for="video" class="file-input-label">
                            <div class="file-input-icon">📹</div>
                            <div class="file-input-text">
                                <strong>Elige un video</strong>
                                <span>o arrastra el archivo aquí</span>
                            </div>
                        </label>
                        <input type="file" id="video" name="video" accept="video/*" required onchange="updateFileName(this)">
                    </div>
                    <div class="file-name" id="file-name"></div>
                </div>

                <button type="submit" class="submit-btn">Subir Video</button>
            </form>

            <div class="form-links">
                <a href="/galeriaVideos">← Volver a la biblioteca</a>
            </div>
        </div>
    </div>

    <script>
        function updateFileName(input) {
            const fileNameDiv = document.getElementById('file-name');
            if (input.files && input.files[0]) {
                const fileName = input.files[0].name;
                const fileSize = (input.files[0].size / 1024 / 1024).toFixed(2);
                fileNameDiv.textContent = `${fileName} (${fileSize} MB)`;
            } else {
                fileNameDiv.textContent = '';
            }
        }

        const fileInput = document.getElementById('video');
        const fileLabel = document.querySelector('.file-input-label');

        fileLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileLabel.style.borderColor = '#065fd4';
            fileLabel.style.background = '#222';
        });

        fileLabel.addEventListener('dragleave', () => {
            fileLabel.style.borderColor = '#333';
            fileLabel.style.background = '#1a1a1a';
        });

        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.style.borderColor = '#333';
            fileLabel.style.background = '#1a1a1a';
            if (e.dataTransfer.files) {
                fileInput.files = e.dataTransfer.files;
                updateFileName(fileInput);
            }
        });
    </script>
</body>
</html>
