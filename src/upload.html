<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Subir video - PrivateV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #f8f9fa;
            color: #1a1a2e;
        }
        .navbar {
            background: #fff;
            border-bottom: 1px solid #e9ecef;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1.15rem;
        }
        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #6c63ff, #e54b4b);
            border-radius: 6px;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: #fff;
        }
        .back-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            background: #fff;
            color: #1a1a2e;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 200ms ease;
        }
        .back-btn:hover { background: #f1f3f5; border-color: #d0d5dd; }
        .upload-container {
            max-width: 560px;
            margin: 60px auto;
            padding: 0 24px;
        }
        .upload-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #e9ecef;
        }
        .upload-header { text-align: center; margin-bottom: 32px; }
        .upload-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .upload-header p { color: #6c757d; font-size: 0.9rem; }
        .upload-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: #495057; }
        .form-group input[type="text"] {
            padding: 12px 14px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 0.95rem;
            transition: all 200ms ease;
            font-family: inherit;
        }
        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
            background: #fff;
        }
        .file-drop {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 32px;
            background: #f8f9fa;
            border: 2px dashed #d0d5dd;
            border-radius: 12px;
            cursor: pointer;
            transition: all 200ms ease;
            text-align: center;
        }
        .file-drop:hover { border-color: #6c63ff; background: #f1f0ff; }
        .file-drop-icon { font-size: 2rem; line-height: 1; }
        .file-drop-text strong { display: block; font-size: 0.95rem; color: #1a1a2e; }
        .file-drop-text span { font-size: 0.85rem; color: #6c757d; }
        .form-group input[type="file"] { display: none; }
        .file-name { font-size: 0.85rem; color: #6c63ff; font-weight: 500; text-align: center; }
        .submit-btn {
            padding: 12px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms ease;
            font-family: inherit;
        }
        .submit-btn:hover { background: #5b52e0; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(108,99,255,0.3); }
        .submit-btn:disabled { background: #adb5bd; cursor: not-allowed; transform: none; box-shadow: none; }
        .form-links { text-align: center; margin-top: 20px; }
        .form-links a { color: #6c757d; text-decoration: none; font-size: 0.9rem; transition: color 200ms ease; }
        .form-links a:hover { color: #1a1a2e; }
        @media (max-width: 600px) {
            .navbar { padding: 12px 16px; }
            .upload-container { margin: 40px auto; }
            .upload-card { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand-logo">
            <div class="logo-icon">P</div>
            <span>PrivateV</span>
        </a>
        <a href="/galeriaVideos" class="back-btn">Volver</a>
    </nav>
    <div class="upload-container">
        <div class="upload-card">
            <div class="upload-header">
                <h2>Subir video</h2>
                <p>MP4, GIF y más — Almacenamiento privado</p>
            </div>
            <form class="upload-form" method="POST" action="/upload/charge" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="nombre">Nombre del video</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Vacaciones en la playa" required>
                </div>
                <div class="form-group">
                    <label>Archivo</label>
                    <label for="video" class="file-drop">
                        <div class="file-drop-icon">📁</div>
                        <div class="file-drop-text">
                            <strong>Elegí un video</strong>
                            <span>o arrastralo acá</span>
                        </div>
                    </label>
                    <input type="file" id="video" name="video" accept="video/*,image/gif,image/png,image/jpeg" required onchange="updateFileName(this)">
                    <div class="file-name" id="file-name"></div>
                </div>
                <button type="submit" class="submit-btn">Subir</button>
            </form>
            <div class="form-links">
                <a href="/galeriaVideos">← Volver a la biblioteca</a>
            </div>
        </div>
    </div>
    <script>
        function updateFileName(input) {
            const el = document.getElementById('file-name');
            if (input.files && input.files[0]) {
                const name = input.files[0].name;
                const size = (input.files[0].size / 1024 / 1024).toFixed(2);
                el.textContent = `${name} (${size} MB)`;
            } else { el.textContent = ''; }
        }
        const fi = document.getElementById('video');
        const fd = document.querySelector('.file-drop');
        fd.addEventListener('dragover', e => { e.preventDefault(); fd.style.borderColor = '#6c63ff'; fd.style.background = '#f1f0ff'; });
        fd.addEventListener('dragleave', () => { fd.style.borderColor = '#d0d5dd'; fd.style.background = '#f8f9fa'; });
        fd.addEventListener('drop', e => {
            e.preventDefault();
            fd.style.borderColor = '#d0d5dd';
            fd.style.background = '#f8f9fa';
            if (e.dataTransfer.files) { fi.files = e.dataTransfer.files; updateFileName(fi); }
        });
    </script>
</body>
</html>
