<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galería de Videos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            min-width: 100vw;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(120deg, #e0e7ff 0%, #f4f4f4 100%);
            display: flex;
            flex-direction: column;
        }
        .logo-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 32px auto 0 auto;
            background: none;
            border: none;
            cursor: pointer;
        }
        .logo-img {
            width: 44px;
            height: 44px;
            margin-right: 10px;
        }
        .logo-text {
            font-size: 1.4em;
            font-weight: 700;
            color: #1a237e;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, #007bff, #7ecbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tab-container {
            width: 100vw;
            display: flex;
            justify-content: center;
            margin-top: 18px;
            margin-bottom: -18px;
        }
        .tab {
            background: #fff;
            border-radius: 18px 18px 0 0;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 18px 48px 10px 48px;
            font-size: 1.25em;
            font-weight: 700;
            color: #1a237e;
            letter-spacing: 1px;
            border-bottom: 4px solid #007bff;
            position: relative;
            z-index: 2;
            min-width: 220px;
            text-align: center;
            user-select: none;
        }
        .container {
            flex: 1 0 auto;
            width: 100vw;
            max-width: 100vw;
            margin: 0;
            background: #fff;
            border-radius: 0 0 18px 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px 2vw 32px 2vw;
            display: flex;
            flex-direction: column;
            min-height: 60vh;
            box-sizing: border-box;
            z-index: 1;
        }
        .upload-link {
            display: block;
            width: fit-content;
            margin: 0 auto 28px auto;
            padding: 10px 22px;
            background: linear-gradient(90deg, #007bff 60%, #0056b3 100%);
            color: #fff;
            border-radius: 7px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05em;
            box-shadow: 0 2px 8px #007bff11;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        }
        .upload-link:hover {
            background: linear-gradient(90deg, #0056b3 60%, #007bff 100%);
            box-shadow: 0 6px 16px #007bff22;
            transform: translateY(-2px) scale(1.03);
        }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 22px;
            width: 100%;
            box-sizing: border-box;
        }
        .video-card {
            background: #f8faff;
            border-radius: 12px;
            box-shadow: 0 1.5px 8px rgba(0,0,0,0.07);
            padding: 14px 10px 12px 10px;
            text-align: center;
            transition: box-shadow 0.18s, transform 0.13s;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 0;
            border: 1px solid #e3e8ff;
        }
        .video-card:hover {
            box-shadow: 0 8px 32px rgba(0,0,0,0.13);
            transform: translateY(-3px) scale(1.02);
            border-color: #b3c6ff;
        }
        .logout-btn {
      display: inline-block;
     margin: 18px 0 0 0;
     padding: 8px 22px;
     background: #e53935;
        color: #fff;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 600;
        font-size: 1em;
        box-shadow: 0 1px 4px #e5393511;
        transition: background 0.18s;
        }
    .logout-btn:hover {
    background: #b71c1c;
    }
        .video-thumb {
            width: 100%;
            max-width: 170px;
            height: 96px;
            background: #e3e3e3;
            border-radius: 7px;
            margin-bottom: 10px;
            object-fit: cover;
            box-shadow: 0 2px 8px #007bff11;
            transition: box-shadow 0.2s;
        }
        .video-title {
            font-size: 1.05em;
            font-weight: 600;
            color: #1a237e;
            margin-bottom: 6px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            width: 100%;
            letter-spacing: 0.2px;
        }
        .watch-link {
            display: inline-block;
            padding: 7px 16px;
            background: #007bff;
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.98em;
            margin-top: 6px;
            font-weight: 500;
            transition: background 0.2s;
            box-shadow: 0 1px 4px #007bff11;
        }
        .watch-link:hover {
            background: #0056b3;
        }
        .no-videos {
            text-align: center;
            color: #888;
            margin-top: 30px;
            font-size: 1em;
            width: 100%;
        }
        @media (max-width: 700px) {
            .tab { padding: 12px 12vw 8px 12vw; font-size: 1em; }
            .container { padding: 10px 0.5vw; }
            .videos-grid { gap: 10px; }
            .video-thumb { max-width: 100%; height: 70px; }
        }
        @media (max-width: 500px) {
            .tab { padding: 10px 2vw 6px 2vw; font-size: 0.98em; }
            .container { padding: 4px 0; }
            .videos-grid { grid-template-columns: 1fr; gap: 8px; }
            .video-card { padding: 6px 2px 6px 2px; }
            .logo-text { font-size: 1em; }
        }
    </style>
</head>
<body>
    <button class="logo-btn" onclick="window.location.href='/sign-in'">
        <svg class="logo-img" viewBox="0 0 64 64" fill="none">
            <defs>
                <radialGradient id="grad1" cx="50%" cy="50%" r="70%">
                    <stop offset="0%" stop-color="#7ecbff"/>
                    <stop offset="100%" stop-color="#007bff"/>
                </radialGradient>
            </defs>
            <circle cx="32" cy="32" r="30" fill="url(#grad1)" stroke="#0056b3" stroke-width="2"/>
            <ellipse cx="32" cy="28" rx="10" ry="10" fill="#fff" opacity="0.95"/>
            <ellipse cx="32" cy="28" rx="6" ry="6" fill="#007bff" opacity="0.85"/>
        </svg>
        <!-- Botón cerrar sesión -->

        <span class="logo-text">MiApp</span>
    </button>
    <div style="display:flex; justify-content:flex-end; max-width:1200px; margin:0 auto; padding:0 2vw;">
    <a href="/logout" class="logout-btn">Cerrar sesión</a>
    </div>
    <div class="tab-container">
        <div class="tab">Galería de Videos</div>
    </div>
    <div class="container">
        <a class="upload-link" href="/upload">➕ Subir video</a>
        <div class="videos-grid">
            {{range .videos}}
            <div class="video-card">
                <a href="/video/{{.}}">
                    <video class="video-thumb" src="/Videos/{{.}}" preload="metadata" muted></video>
                </a>
                <div class="video-title" title="{{.}}">{{.}}</div>
                <a class="watch-link" href="/video/{{.}}">Ver</a>
            </div>
            {{else}}
            <div class="no-videos">No hay videos subidos aún.</div>
            {{end}}
        </div>
    </div>
</body>
</html>
